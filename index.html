<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendario</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; }

  header { background: #fff; border-bottom: 1px solid #e0e0e0; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 20px; font-weight: 600; }
  #cal-title { font-size: 13px; color: #666; margin-top: 2px; }

  .nav { display: flex; align-items: center; gap: 12px; }
  .nav button { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 6px 14px; font-size: 14px; cursor: pointer; transition: background 0.15s; }
  .nav button:hover { background: #f0f0f0; }
  #month-label { font-size: 16px; font-weight: 600; min-width: 160px; text-align: center; }

  .view-toggle { display: flex; gap: 4px; }
  .view-toggle button { padding: 6px 12px; border: 1px solid #ddd; background: #fff; border-radius: 8px; font-size: 13px; cursor: pointer; }
  .view-toggle button.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }

  main { max-width: 1100px; margin: 24px auto; padding: 0 16px; }

  #loading { text-align: center; padding: 60px; color: #888; font-size: 15px; }
  #error { text-align: center; padding: 40px; color: #c0392b; font-size: 14px; background: #fff5f5; border-radius: 12px; }

  /* MONTH VIEW */
  .calendar-grid { background: #fff; border-radius: 12px; border: 1px solid #e0e0e0; overflow: hidden; }
  .day-headers { display: grid; grid-template-columns: repeat(7, 1fr); background: #fafafa; border-bottom: 1px solid #e0e0e0; }
  .day-header { padding: 10px 0; text-align: center; font-size: 12px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.05em; }
  .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
  .day-cell { min-height: 100px; border-right: 1px solid #f0f0f0; border-bottom: 1px solid #f0f0f0; padding: 6px; position: relative; }
  .day-cell:nth-child(7n) { border-right: none; }
  .day-cell.other-month .day-num { color: #ccc; }
  .day-cell.today { background: #fffbf0; }
  .day-cell.today .day-num { background: #1a1a1a; color: #fff; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
  .day-num { font-size: 13px; font-weight: 500; margin-bottom: 4px; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
  .event-pill { font-size: 11px; padding: 2px 6px; border-radius: 4px; margin-bottom: 2px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: opacity 0.15s; }
  .event-pill:hover { opacity: 0.8; }
  .more-events { font-size: 11px; color: #888; cursor: pointer; padding: 1px 6px; }
  .more-events:hover { color: #1a1a1a; }

  /* LIST VIEW */
  .list-view { display: flex; flex-direction: column; gap: 8px; }
  .list-day-group { background: #fff; border-radius: 10px; border: 1px solid #e0e0e0; overflow: hidden; }
  .list-day-header { padding: 10px 16px; background: #fafafa; border-bottom: 1px solid #f0f0f0; font-size: 13px; font-weight: 600; color: #555; }
  .list-event { padding: 12px 16px; border-bottom: 1px solid #f5f5f5; cursor: pointer; display: flex; align-items: flex-start; gap: 12px; transition: background 0.1s; }
  .list-event:last-child { border-bottom: none; }
  .list-event:hover { background: #fafafa; }
  .list-event-dot { width: 10px; height: 10px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
  .list-event-title { font-size: 14px; font-weight: 500; }
  .list-event-time { font-size: 12px; color: #888; margin-top: 2px; }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.35); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .modal { background: #fff; border-radius: 14px; padding: 24px; max-width: 420px; width: 90%; box-shadow: 0 8px 32px rgba(0,0,0,0.18); }
  .modal h2 { font-size: 16px; font-weight: 600; margin-bottom: 12px; }
  .modal-row { display: flex; gap: 8px; font-size: 13px; color: #555; margin-bottom: 6px; }
  .modal-label { font-weight: 600; color: #333; min-width: 70px; }
  .modal-close { float: right; background: none; border: none; font-size: 20px; cursor: pointer; color: #888; line-height: 1; margin-top: -4px; }

  @media (max-width: 600px) {
    .day-cell { min-height: 60px; padding: 4px; }
    .day-num { font-size: 11px; }
    .event-pill { font-size: 10px; }
    header { flex-wrap: wrap; gap: 10px; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>Calendario</h1>
    <div id="cal-title">Caricamento...</div>
  </div>
  <div class="nav">
    <button onclick="changeMonth(-1)">&#8592;</button>
    <span id="month-label"></span>
    <button onclick="changeMonth(1)">&#8594;</button>
  </div>
  <div class="view-toggle">
    <button class="active" onclick="setView('month', this)">Mese</button>
    <button onclick="setView('list', this)">Lista</button>
  </div>
</header>

<main>
  <div id="loading">Caricamento eventi in corso...</div>
  <div id="error" style="display:none"></div>
  <div id="calendar-container"></div>
</main>

<div id="modal-overlay" class="modal-overlay" style="display:none" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="document.getElementById('modal-overlay').style.display='none'">&#10005;</button>
    <h2 id="modal-title"></h2>
    <div id="modal-body"></div>
  </div>
</div>

<script>
const LOCAL_ICS = './calendar.ics';

const COLORS = ['#4F8EF7','#43C59E','#F7874F','#A06CF7','#F74F6E','#F7C44F','#4FC5F7','#7BC67A'];
const DAYS_IT = ['Dom','Lun','Mar','Mer','Gio','Ven','Sab'];
const MONTHS_IT = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];

let allEvents = [];
let currentView = 'month';
let currentDate = new Date();
currentDate.setDate(1);

function parseICS(text) {
  const events = [];
  const blocks = text.split('BEGIN:VEVENT');
  const calName = (text.match(/X-WR-CALNAME:(.+)/)?.[1] || '').trim();

  for (let i = 1; i < blocks.length; i++) {
    const b = blocks[i];
    const get = (key) => {
      const m = b.match(new RegExp(key + '(?:;[^:]*)?:([^\\r\\n]*)'));
      return m ? m[1].trim() : '';
    };
    const parseDate = (raw) => {
      if (!raw) return null;
      const d = raw.replace(/[TZ]/g, '');
      return new Date(
        d.length >= 8 ? +d.slice(0,4) : 0,
        d.length >= 6 ? +d.slice(4,6)-1 : 0,
        d.length >= 8 ? +d.slice(6,8) : 1,
        d.length >= 10 ? +d.slice(8,10) : 0,
        d.length >= 12 ? +d.slice(10,12) : 0
      );
    };
    const dtstart = get('DTSTART');
    const dtend = get('DTEND');
    const allDay = dtstart.length === 8 || dtstart.includes('VALUE=DATE');
    events.push({
      uid: get('UID'),
      summary: get('SUMMARY').replace(/\\n/g,'').replace(/\\,/g,',') || '(Senza titolo)',
      description: get('DESCRIPTION').replace(/\\n/g,'\n').replace(/\\,/g,','),
      location: get('LOCATION').replace(/\\,/g,','),
      start: parseDate(dtstart.replace('VALUE=DATE:','')),
      end: parseDate(dtend.replace('VALUE=DATE:','')),
      allDay
    });
  }
  return { events, calName };
}

async function loadFeed() {
  try {
    const res = await fetch(LOCAL_ICS);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    const { events, calName } = parseICS(text);
    allEvents = events.filter(e => e.start);
    allEvents.sort((a,b) => a.start - b.start);
    allEvents.forEach((e,i) => e.color = COLORS[i % COLORS.length]);
    document.getElementById('cal-title').textContent = calName || 'Feed ICS';
    document.getElementById('loading').style.display = 'none';
    render();
  } catch(err) {
    document.getElementById('loading').style.display = 'none';
    const el = document.getElementById('error');
    el.style.display = 'block';
    el.innerHTML = `<strong>Impossibile caricare il calendario.</strong><br>
      Il file calendar.ics non è ancora stato generato.<br>
      Vai su GitHub → Actions → "Fetch ICS Feed" → "Run workflow".<br>
      <small>Errore: ${err.message}</small>`;
  }
}

function sameDay(a, b) {
  return a && b && a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
}
function dateKey(d) { return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate(); }

function eventsForDay(date) {
  return allEvents.filter(e => {
    if (!e.start) return false;
    if (sameDay(e.start, date)) return true;
    if (e.end && e.start < date && e.end > date) return true;
    return false;
  });
}

function formatTime(d, allDay) {
  if (allDay) return 'Tutto il giorno';
  return d.toLocaleTimeString('it-IT', { hour:'2-digit', minute:'2-digit' });
}

function formatDateFull(d) {
  return d.toLocaleDateString('it-IT', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
}

function openEvent(ev) {
  document.getElementById('modal-title').textContent = ev.summary;
  let html = '';
  if (ev.start) html += `<div class="modal-row"><span class="modal-label">Inizio</span><span>${formatDateFull(ev.start)}${!ev.allDay ? ' ' + formatTime(ev.start, false) : ''}</span></div>`;
  if (ev.end) html += `<div class="modal-row"><span class="modal-label">Fine</span><span>${formatDateFull(ev.end)}${!ev.allDay ? ' ' + formatTime(ev.end, false) : ''}</span></div>`;
  if (ev.location) html += `<div class="modal-row"><span class="modal-label">Luogo</span><span>${ev.location}</span></div>`;
  if (ev.description) html += `<div class="modal-row"><span class="modal-label">Note</span><span style="white-space:pre-wrap">${ev.description}</span></div>`;
  document.getElementById('modal-body').innerHTML = html || '<span style="color:#888">Nessun dettaglio disponibile.</span>';
  document.getElementById('modal-overlay').style.display = 'flex';
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-overlay')) document.getElementById('modal-overlay').style.display = 'none';
}

function render() {
  if (currentView === 'month') renderMonth();
  else renderList();
}

function renderMonth() {
  const y = currentDate.getFullYear(), m = currentDate.getMonth();
  document.getElementById('month-label').textContent = MONTHS_IT[m] + ' ' + y;

  const firstDay = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const today = new Date();

  let html = '<div class="calendar-grid"><div class="day-headers">';
  DAYS_IT.forEach(d => html += `<div class="day-header">${d}</div>`);
  html += '</div><div class="days-grid">';

  const startOffset = firstDay;
  const prevDays = new Date(y, m, 0).getDate();
  for (let i = startOffset - 1; i >= 0; i--) {
    html += `<div class="day-cell other-month"><div class="day-num">${prevDays - i}</div></div>`;
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const cellDate = new Date(y, m, d);
    const isToday = sameDay(cellDate, today);
    const evs = eventsForDay(cellDate);
    html += `<div class="day-cell${isToday ? ' today' : ''}">`;
    html += `<div class="day-num">${d}</div>`;
    const shown = evs.slice(0, 3);
    shown.forEach(ev => {
      html += `<div class="event-pill" style="background:${ev.color}22;color:${ev.color};border-left:3px solid ${ev.color}" onclick='openEventById("${ev.uid}")'>${ev.summary}</div>`;
    });
    if (evs.length > 3) html += `<div class="more-events">+${evs.length - 3} altri</div>`;
    html += '</div>';
  }

  const totalCells = startOffset + daysInMonth;
  const remaining = (7 - (totalCells % 7)) % 7;
  for (let i = 1; i <= remaining; i++) {
    html += `<div class="day-cell other-month"><div class="day-num">${i}</div></div>`;
  }

  html += '</div></div>';
  document.getElementById('calendar-container').innerHTML = html;
}

function renderList() {
  const y = currentDate.getFullYear(), m = currentDate.getMonth();
  document.getElementById('month-label').textContent = MONTHS_IT[m] + ' ' + y;

  const monthEvents = allEvents.filter(e => e.start && e.start.getFullYear() === y && e.start.getMonth() === m);
  if (monthEvents.length === 0) {
    document.getElementById('calendar-container').innerHTML = '<div style="text-align:center;padding:40px;color:#888">Nessun evento questo mese.</div>';
    return;
  }
  const groups = {};
  monthEvents.forEach(ev => {
    const k = dateKey(ev.start);
    if (!groups[k]) groups[k] = { date: ev.start, events: [] };
    groups[k].events.push(ev);
  });
  let html = '<div class="list-view">';
  Object.values(groups).sort((a,b) => a.date - b.date).forEach(g => {
    html += `<div class="list-day-group"><div class="list-day-header">${formatDateFull(g.date)}</div>`;
    g.events.forEach(ev => {
      html += `<div class="list-event" onclick='openEventById("${ev.uid}")'><div class="list-event-dot" style="background:${ev.color}"></div><div><div class="list-event-title">${ev.summary}</div><div class="list-event-time">${formatTime(ev.start, ev.allDay)}</div></div></div>`;
    });
    html += '</div>';
  });
  html += '</div>';
  document.getElementById('calendar-container').innerHTML = html;
}

window.openEventById = function(uid) {
  const ev = allEvents.find(e => e.uid === uid);
  if (ev) openEvent(ev);
};

function changeMonth(dir) {
  currentDate.setMonth(currentDate.getMonth() + dir);
  render();
}

function setView(v, btn) {
  currentView = v;
  document.querySelectorAll('.view-toggle button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

loadFeed();
</script>
</body>
</html>
