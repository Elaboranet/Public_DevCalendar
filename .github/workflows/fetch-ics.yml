name: Fetch ICS Feed

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fetch-ics
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Download ICS
        run: |
          curl -fsSL -o calendar.ics \
            "https://iwygengoglxqytnbnqgt.supabase.co/functions/v1/calendar-feed/7dc439831790444e873def93aeeb81a04a4e258877b1411fa96ea2bfb3f010ef.ics"
          [ -s calendar.ics ] || { echo "File ICS vuoto"; exit 1; }
          echo "Scaricate $(wc -l < calendar.ics) righe"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          if git diff --quiet calendar.ics; then
            echo "Nessuna modifica, skip."
            exit 0
          fi
          
          for i in 1 2 3; do
            git add calendar.ics
            git commit -m "chore: update calendar.ics [skip ci]" || exit 0
            git pull --rebase origin main
            if git push origin main; then
              echo "Push riuscito al tentativo $i"
              exit 0
            fi
            echo "Tentativo $i fallito, retry..."
            git reset --soft HEAD~1
          done
          
          echo "Push fallito dopo 3 tentativi"
          exit 1
