name: Fetch ICS Feed

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Download ICS and push via API
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          curl -L -o calendar.ics "https://iwygengoglxqytnbnqgt.supabase.co/functions/v1/calendar-feed/7dc439831790444e873def93aeeb81a04a4e258877b1411fa96ea2bfb3f010ef.ics"

          CONTENT=$(base64 -w 0 calendar.ics)

          SHA=$(curl -s \
            -H "Authorization: token $PAT_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$REPO/contents/calendar.ics" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('sha',''))" 2>/dev/null || echo "")

          if [ -z "$SHA" ]; then
            BODY=$(python3 -c "import json; print(json.dumps({'message':'Update calendar.ics','content':'$CONTENT'}))")
          else
            BODY=$(python3 -c "import json; print(json.dumps({'message':'Update calendar.ics','content':'$CONTENT','sha':'$SHA'}))")
          fi

          curl -s -X PUT \
            -H "Authorization: token $PAT_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$REPO/contents/calendar.ics" \
            -d "$BODY"

          echo "Done!"
